server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/ requests to the CognitWin backend
    location /api/ {
        proxy_pass         http://cognitwin-api:8011;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 60s;
        proxy_buffering    off;
    }

    # Serve cockpit.html explicitly (also reachable via try_files)
    location = /cockpit.html {
        try_files /cockpit.html =404;
    }

    # Serve the workspace selection landing page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight health-check endpoint for Docker
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Security: hide nginx version from response headers
    server_tokens off;
}
