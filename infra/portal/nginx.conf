server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Serve the workspace selection landing page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight health-check endpoint for Docker
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Security: hide nginx version from response headers
    server_tokens off;
}
