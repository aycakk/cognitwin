version: "1.3.4"

# ──────────────────────────────────────────────────────────────────────────────
# CogniTwin — Agile LibreChat endpoint configuration
#
# This file is mounted ONLY by the agile-facing LibreChat instance (port 3901).
# The student "CogniTwin Student" endpoint is completely absent — project users
# only see the four agile agents in their model picker.
#
# Access control is two-layer:
#   UI layer:      only agile agents appear in the model picker on port 3901.
#   Backend layer: the agile apiKey maps to role="agile" in cognitwin-api.
#                  The backend returns HTTP 403 for any attempt to reach student
#                  models, even via a manually crafted request.
#
# The Composer model orchestrates the full PO → SM → Developer pipeline.
# Select it for new project workflow requests.
# ──────────────────────────────────────────────────────────────────────────────

endpoints:
  custom:

    # ── Agile / project-workflow path ───────────────────────────────────────
    # Only endpoint visible to project-track users.
    # The apiKey encodes the "agile" role — the backend filters model visibility
    # and enforces HTTP 403 for any student-only model.
    - name: "CogniTwin Agile"
      apiKey: "${COGNITWIN_AGILE_KEY:-cognitwin-agile}"
      baseURL: "http://cognitwin-api:8011/v1/"
      models:
        default:
          - "cognitwin-composer"
          - "cognitwin-product-owner"
          - "cognitwin-scrum"
          - "cognitwin-developer"
        fetch: false
      modelDisplayLabel: "CogniTwin Agile"
      titleConvo: true
      titleModel: "cognitwin-composer"
