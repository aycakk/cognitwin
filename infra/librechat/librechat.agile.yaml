version: "1.3.4"

# ──────────────────────────────────────────────────────────────────────────────
# CogniTwin — Agile LibreChat endpoint yapılandırması (port 3901)
#
# Bu dosya SADECE agile/proje kullanıcısı LibreChat instance'ı tarafından kullanılır.
# Öğrenci modeli (cognitwin-student-llm) bu dosyada YOK.
# Proje kullanıcıları yalnızca dört agile agent görür.
#
# Erişim denetimi iki katmanlı:
#   UI katmanı:      Sadece "CogniTwin Agile" endpoint ve dört model görünür.
#   Backend katmanı: cognitwin-api, öğrenci modellerine gelen her isteği HTTP 403
#                    ile reddeder — kullanıcı model adını manuel yazmış olsa bile.
#
# Model seçimi:
#   • cognitwin-composer      → Tam PO → SM → Developer pipeline'ını başlatır
#   • cognitwin-product-owner → Sadece PO aşamasını çalıştırır
#   • cognitwin-scrum         → Sadece SM aşamasını çalıştırır
#   • cognitwin-developer     → Sadece Developer aşamasını çalıştırır
# ──────────────────────────────────────────────────────────────────────────────

endpoints:

  # ── LibreChat built-in endpoint'lerini tamamen kapat ─────────────────────
  # Bu satırlar olmazsa LibreChat, API key olmasa bile openAI/anthropic/google
  # seçeneklerini dropdown'da gösterir.  Agile kullanıcı UI'ında hiçbir
  # built-in endpoint görünmemeli.
  openAI:
    disabled: true
  azureOpenAI:
    disabled: true
  google:
    disabled: true
  anthropic:
    disabled: true
  assistants:
    disabled: true
  gptPlugins:
    disabled: true

  # ── Agile / proje workflow endpoint ─────────────────────────────────────
  custom:
    - name: "CogniTwin Agile"
      apiKey: "${COGNITWIN_AGILE_KEY:-cognitwin-agile}"
      baseURL: "http://cognitwin-api:8011/v1/"
      models:
        default:
          - "cognitwin-composer"
          - "cognitwin-product-owner"
          - "cognitwin-scrum"
          - "cognitwin-developer"
        fetch: false
      modelDisplayLabel: "CogniTwin Agile"
      titleConvo: true
      titleModel: "cognitwin-composer"
