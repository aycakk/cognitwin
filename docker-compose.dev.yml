# ============================================================================
# CogniTwin — Development Overrides
# ============================================================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Adds bind mounts for live editing, hot-reload, and exposes debug ports.
#

services:

  cognitwin-api:
    environment:
      SCRUM_MODEL_PATH: "/app/models/scrum_model"
    volumes:
      - ./src:/app/src
      - ./static/chromadb:/app/static/chromadb
      - ./logs:/app/logs
      - ./data:/app/data
      - ./ontologies:/app/ontologies
      - ./models/scrum_model:/app/models/scrum_model
    command:
      - python
      - -m
      - uvicorn
      - src.services.api.app:app
      - --host
      - "0.0.0.0"
      - --port
      - "8011"
      - --reload
      - --reload-dir
      - /app/src

  mongodb:
    ports:
      - "27017:27017"

  meilisearch:
    ports:
      - "7700:7700"
