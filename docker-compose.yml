# ============================================================================
# CogniTwin — Unified Docker Compose Stack
# ============================================================================
#
# Default (portable):  docker compose up -d --build
# Development:         docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#

services:

  # ── CogniTwin FastAPI Backend ─────────────────────────────────────────────
  cognitwin-api:
    build: .
    container_name: cognitwin-api
    restart: unless-stopped
    ports:
      # Host port 8011 falls in the Windows Hyper-V/WinNAT reserved range
      # (7962–8061) and cannot be bound on this machine.
      # The container still listens on 8011 internally — LibreChat connects
      # via Docker networking (http://cognitwin-api:8011/v1/) and is unaffected.
      # Use http://localhost:8600 for direct host-side access to the API.
      - "8600:8011"
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      # Centralised model selection. Override by exporting OLLAMA_MODEL=...
      # before `docker compose up` (e.g. OLLAMA_MODEL=llama3.2:1b for the
      # smaller/faster model). Read by src/core/llm_config.DEFAULT_MODEL.
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2}"
    volumes:
      - cognitwin_chromadb:/app/static/chromadb
      - cognitwin_logs:/app/logs
      - cognitwin_data:/app/data
    depends_on:
      ollama-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - cognitwin-net

  # ── Ollama (local LLM runtime) ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cognitwin-ollama
    restart: unless-stopped
    # Docker's embedded resolver (127.0.0.11) sometimes fails to resolve
    # Cloudflare R2 hostnames during `ollama pull` (the model registry
    # redirects to per-blob *.r2.cloudflarestorage.com URLs). Falling back
    # to public resolvers makes large model pulls reliable.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cognitwin-net

  # ── Ollama Bootstrap (one-shot model pull) ───────────────────────────────
  ollama-bootstrap:
    image: ollama/ollama:latest
    container_name: cognitwin-ollama-bootstrap
    restart: "no"
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: ["sh", "-c", "ollama pull ${OLLAMA_MODEL:-llama3.2}"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - cognitwin-net

  # ── CogniTwin Portal — Workspace seçim sayfası (port 8080) ─────────────
  #
  # Kullanıcıların ilk açtığı giriş noktası.
  # İki seçenek sunar:
  #   Öğrenci          → http://<host>:3900  (librechat-student)
  #   Proje / Agile    → http://<host>:3901  (librechat-agile)
  #
  # nginx:alpine üzerinde tek bir index.html — bağımlılık yok, anında başlar.
  # Hedef URL'ler JavaScript ile hostname'den türetilir; ekstra yapılandırma gerekmez.
  portal:
    image: nginx:alpine
    container_name: cognitwin-portal
    restart: unless-stopped
    ports:
      - "${PORTAL_PORT:-8080}:80"
    volumes:
      - ./infra/portal/index.html:/usr/share/nginx/html/index.html:ro
      - ./infra/portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - cognitwin-net

  # ── LibreChat — Student UI (port 3900) ──────────────────────────────────
  #
  # Visible to academic / student users only.
  # Mounts librechat.student.yaml → only "CogniTwin Student" endpoint appears
  # in the model picker.  Agile agents are absent from the UI entirely.
  # Backend RBAC (cognitwin-api) provides a second enforcement layer.
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat-student
    restart: unless-stopped
    ports:
      - "${LIBRECHAT_PORT:-3900}:3900"
    environment:
      HOST: "0.0.0.0"
      PORT: "3900"
      DOMAIN_CLIENT: "${DOMAIN_CLIENT:-http://localhost:3900}"
      DOMAIN_SERVER: "${DOMAIN_SERVER:-http://localhost:3900}"
      MONGO_URI: "${MONGO_URI:-mongodb://mongodb:27017/LibreChat}"
      MEILI_HOST: "http://meilisearch:7700"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-change-me}"
      DEBUG_LOGGING: "${DEBUG_LOGGING:-true}"
      DEBUG_CONSOLE: "${DEBUG_CONSOLE:-false}"
      ALLOW_REGISTRATION: "${ALLOW_REGISTRATION:-true}"
      NO_INDEX: "${NO_INDEX:-true}"
      TRUST_PROXY: "${TRUST_PROXY:-1}"
      JWT_SECRET: "${JWT_SECRET:-change-this-jwt-secret}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-change-this-jwt-refresh-secret}"
      # COGNITWIN_STUDENT_KEY container'a eksplisit geçiriliyor;
      # librechat.student.yaml içindeki ${COGNITWIN_STUDENT_KEY:-cognitwin-student}
      # bu değişkeni okur.  Default "cognitwin-student" yerel geliştirme için yeterli.
      COGNITWIN_STUDENT_KEY: "${COGNITWIN_STUDENT_KEY:-cognitwin-student}"
      # Sadece custom endpoint'i etkinleştir — LibreChat v0.8.x'in ResumableAgentController
      # (Agents feature) otomatik başlatmasını engeller.  Bu olmazsa LibreChat "CogniTwin Student"
      # key'ini OpenAI key olarak kabul etmeye çalışır ve her mesajda
      # "agent_id is required in request body" hatası döner.
      ENDPOINTS: "custom"
    volumes:
      - ./infra/librechat/librechat.student.yaml:/app/librechat.yaml:ro
      - librechat_images:/app/client/public/images
      - librechat_logs:/app/api/logs
    depends_on:
      mongodb:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      cognitwin-api:
        condition: service_healthy
    healthcheck:
      # LibreChat does not expose /health.
      # Use 127.0.0.1 explicitly — inside this container wget resolves
      # "localhost" → ::1 (IPv6) but Node.js only binds on 0.0.0.0 (IPv4),
      # so the IPv6 attempt always gets "Connection refused".
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3900/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cognitwin-net

  # ── LibreChat — Agile UI (port 3901) ─────────────────────────────────────
  #
  # Visible to project-track / agile users only.
  # Mounts librechat.agile.yaml → only agile agents (Composer, PO, SM, Dev)
  # appear in the model picker.  Student models are absent from the UI entirely.
  # Uses a separate MongoDB database (LibreChat_Agile) so student and agile
  # user accounts, conversations, and settings are fully isolated.
  #
  # Direct students to http://<host>:3900
  # Direct project users to http://<host>:3901
  librechat-agile:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat-agile
    restart: unless-stopped
    ports:
      - "${AGILE_PORT:-3901}:3901"
    environment:
      HOST: "0.0.0.0"
      PORT: "3901"
      DOMAIN_CLIENT: "${AGILE_DOMAIN_CLIENT:-http://localhost:3901}"
      DOMAIN_SERVER: "${AGILE_DOMAIN_SERVER:-http://localhost:3901}"
      MONGO_URI: "${AGILE_MONGO_URI:-mongodb://mongodb:27017/LibreChat_Agile}"
      MEILI_HOST: "http://meilisearch:7700"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-change-me}"
      DEBUG_LOGGING: "${DEBUG_LOGGING:-true}"
      DEBUG_CONSOLE: "${DEBUG_CONSOLE:-false}"
      ALLOW_REGISTRATION: "${ALLOW_REGISTRATION:-true}"
      NO_INDEX: "${NO_INDEX:-true}"
      TRUST_PROXY: "${TRUST_PROXY:-1}"
      JWT_SECRET: "${JWT_SECRET:-change-this-jwt-secret}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-change-this-jwt-refresh-secret}"
      # COGNITWIN_AGILE_KEY container'a eksplisit geçiriliyor;
      # librechat.agile.yaml içindeki ${COGNITWIN_AGILE_KEY:-cognitwin-agile}
      # bu değişkeni okur.  Default "cognitwin-agile" yerel geliştirme için yeterli.
      COGNITWIN_AGILE_KEY: "${COGNITWIN_AGILE_KEY:-cognitwin-agile}"
      # Sadece custom endpoint'i etkinleştir — LibreChat v0.8.x'in ResumableAgentController
      # (Agents feature) otomatik başlatmasını engeller.  Bu olmazsa LibreChat "CogniTwin Agile"
      # key'ini OpenAI key olarak kabul etmeye çalışır ve her mesajda
      # "agent_id is required in request body" hatası döner.
      ENDPOINTS: "custom"
    volumes:
      - ./infra/librechat/librechat.agile.yaml:/app/librechat.yaml:ro
      - librechat_agile_images:/app/client/public/images
      - librechat_agile_logs:/app/api/logs
    depends_on:
      mongodb:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      cognitwin-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3901/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cognitwin-net

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: librechat-mongodb
    restart: unless-stopped
    volumes:
      - librechat_mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - cognitwin-net

  # ── Meilisearch ──────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: librechat-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-change-me}"
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - librechat_meilisearch:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cognitwin-net

networks:
  cognitwin-net:
    driver: bridge

volumes:
  ollama_data:
  cognitwin_chromadb:
  cognitwin_logs:
  cognitwin_data:
  librechat_mongodb:
  librechat_meilisearch:
  librechat_images:
  librechat_logs:
  librechat_agile_images:
  librechat_agile_logs:
